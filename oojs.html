<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>OOJS Grafika - Web programozás-1</title>
    <style>
        /* 1. Alap elrendezés (Flexbox), hogy a lábléc alul maradjon */
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f4f4f4; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        header { 
            background-color: #e10600; 
            color: white; 
            text-align: center; 
            padding: 25px 20px; 
        }
        header h1 { 
            margin: 0; 
            font-size: 2.2em; 
        }
        nav { background-color: #15151e; text-align: center; padding: 15px 0; z-index: 100; }
        nav a { color: white; text-decoration: none; font-weight: bold; font-size: 1.1em; margin: 0 15px; }
        nav a:hover { color: #e10600; }

        /* 3. A Rajztábla (Main terület) */
        main { 
            flex: 1; 
            position: relative; 
            overflow: hidden; 
            background-color: #1a1a1a; 
        }

        /* Vezérlőpanel stílusa - KÖZÉPRE IGAZÍTVA */
        #vezerlo { 
            position: absolute; 
            top: 20px; 
            left: 50%; /* Középre toljuk */
            transform: translateX(-50%); /* Visszahúzzuk a saját szélessége felével */
            z-index: 50; 
            background: rgba(0,0,0,0.85); 
            padding: 25px; 
            border-radius: 8px; 
            border-top: 4px solid #e10600; 
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            text-align: center; /* Belül is középen legyenek a gombok */
            min-width: 350px;
        }

        /* Alakzatok stílusa */
        .alakzat { 
            position: absolute; 
            cursor: pointer; 
            transition: transform 0.2s, opacity 0.2s; 
            box-shadow: 0 0 15px rgba(255,255,255,0.2); 
            border: 2px solid rgba(255,255,255,0.5); 
        }
        .alakzat:hover { transform: scale(1.1); opacity: 0.8; }

        button { 
            padding: 10px 15px; 
            margin: 5px; 
            cursor: pointer; 
            background-color: #e10600; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            transition: 0.2s;
        }
        button:hover { background-color: #b30500; transform: translateY(-2px); }

        footer { background-color: #15151e; color: white; text-align: center; padding: 20px; font-size: 0.9em; z-index: 100; }
    </style>
</head>
<body>

    <header>
        <h1>Web programozás-1 Beadandó Feladat</h1>
    </header>

    <nav>
        <a href="index.html">Főoldal</a>
        <a href="jscrud.html">JavaScript CRUD</a>
        <a href="reactcrud.html">React CRUD</a>
        <a href="spa.html">SPA</a>
        <a href="fetchapi.html">Fetch API</a>
        <a href="axios.html">Axios</a>
        <a href="oojs.html">OOJS</a>
    </nav>

    <main id="canvas">
        <div id="vezerlo">
            <h2 style="margin-top:0;">7. Feladat: OOJS Alakzatok</h2>
            <p>Kattints a gombokra az alakzatok generálásához!<br>
            <small style="color: #ccc;">(Kattints egy alakzatra a törléshez.)</small></p>
            <button onclick="kellEgyKor()">🔴 Kör generálása</button>
            <button onclick="kellEgyNegyzet()">🟦 Négyzet generálása</button>
        </div>
    </main>

    <footer>
        Készítette: Zahorszki Csaba [Q3R1ZR] és Fajcsák Gábor [DYE996]
    </footer>

    <script>
        const canvas = document.getElementById('canvas');

        class Alakzat {
            constructor(nev) {
                this.nev = nev;
                this.meret = Math.floor(Math.random() * 80) + 40;
                
                const rect = canvas.getBoundingClientRect();
                // Úgy számolunk, hogy ne lógjanak ki és ne a menü alá kerüljenek
                this.x = Math.random() * (rect.width - this.meret - 40) + 20;
                this.y = Math.random() * (rect.height - this.meret - 40) + 20;
                
                this.szin = `hsl(${Math.random() * 360}, 80%, 50%)`;
                
                this.elem = document.createElement('div');
                this.elem.className = 'alakzat';
            }

            megjelenit() {
                this.elem.style.width = this.meret + 'px';
                this.elem.style.height = this.meret + 'px';
                this.elem.style.backgroundColor = this.szin;
                this.elem.style.left = this.x + 'px';
                this.elem.style.top = this.y + 'px';

                this.elem.onclick = () => this.elem.remove();
                canvas.appendChild(this.elem);
            }
        }

        class Kor extends Alakzat {
            constructor() {
                super('Kör'); 
                this.elem.style.borderRadius = '50%';
            }
        }

        class Negyzet extends Alakzat {
            constructor() {
                super('Négyzet');
            }
        }

        function kellEgyKor() {
            const ujKor = new Kor();
            ujKor.megjelenit();
        }

        function kellEgyNegyzet() {
            const ujNegyzet = new Negyzet();
            ujNegyzet.megjelenit();
        }
    </script>
</body>
</html>
