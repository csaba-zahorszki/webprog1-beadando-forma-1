<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Fetch API CRUD - Eredmények</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f4f4f4; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #c82323; color: white; text-align: center; padding: 30px 20px; }
        header h1 { margin: 0; font-size: 2.2em; }
        nav { background-color: #15151e; text-align: center; padding: 15px 0; }
        nav a { color: white; text-decoration: none; font-weight: bold; font-size: 1.1em; margin: 0 15px; }
        nav a:hover { color: #c82323; }
        footer { background-color: #15151e; color: white; text-align: center; padding: 20px; font-size: 0.9em; margin-top: auto; }
        main { flex: 1; padding: 40px 20px; } 

        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; background: #eee; padding: 15px; border-radius: 5px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1; min-width: 120px; }
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 3px; color: white; font-weight: bold; white-space: nowrap; }
        .btn-add { background: #e10600; }
        .btn-update { background: #f39c12; }
        .btn-delete { background: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #15151e; color: white; user-select: none; }
        
        /* Lapozó gombok stílusa */
        .pagination-btn { background: #15151e; color: white; margin: 0 5px; transition: 0.2s; }
        .pagination-btn:hover:not(:disabled) { background: #e10600; }
        .pagination-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <h1>Web programozás-1 Beadandó Feladat</h1>
    </header>
    <nav>
        <a href="index.html">Főoldal</a>
        <a href="jscrud.html">JavaScript CRUD</a>
        <a href="reactcrud.html">React CRUD</a>
        <a href="spa.html">SPA</a>
        <a href="fetchapi.html">Fetch API</a>
        <a href="axios.html">Axios</a>
        <a href="oojs.html">OOJS</a>
    </nav>

    <main>
        <div class="container">
            <h2 style="color: #c82323; margin-top: 0;">F1 Eredmények (Szerverrel + MySQL)</h2>
            
            <div class="form-group">
                <input type="hidden" id="editId">
                <input type="text" id="pDatum" placeholder="Dátum (pl. 1958.10.19)">
                <input type="number" id="pPilotaaz" placeholder="Pilóta ID">
                <input type="number" id="pHelyezes" placeholder="Helyezés">
                <input type="text" id="pHiba" placeholder="Hiba (ha volt)">
                <input type="text" id="pCsapat" placeholder="Csapat">
                <input type="text" id="pTipus" placeholder="Típus">
                <input type="text" id="pMotor" placeholder="Motor">
                
                <button id="submitBtn" class="btn-add" onclick="handleSubmit()">Hozzáadás</button>
                <button id="cancelBtn" style="display:none; background:gray;" onclick="resetForm()">Mégse</button>
            </div>

            <table id="pTable">
                <thead>
                    <tr>
                        <th onclick="requestSort('datum')" style="cursor:pointer">Dátum <span id="sort-datum">↕️</span></th>
                        <th onclick="requestSort('pilota_neve')" style="cursor:pointer">Pilóta Neve <span id="sort-pilota_neve">↕️</span></th>
                        <th onclick="requestSort('helyezes')" style="cursor:pointer">Helyezés <span id="sort-helyezes">↕️</span></th>
                        <th onclick="requestSort('hiba')" style="cursor:pointer">Hiba <span id="sort-hiba">↕️</span></th>
                        <th onclick="requestSort('csapat')" style="cursor:pointer">Csapat <span id="sort-csapat">↕️</span></th>
                        <th onclick="requestSort('tipus')" style="cursor:pointer">Típus <span id="sort-tipus">↕️</span></th>
                        <th onclick="requestSort('motor')" style="cursor:pointer">Motor <span id="sort-motor">↕️</span></th>
                        <th>Műveletek</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            
            <div id="paginationContainer" style="text-align: center; margin-top: 25px; padding: 10px;"></div>
        </div>
    </main>

    <footer>
        Készítette: Zahorszki Csaba [Q3R1ZR] és Fajcsák Gábor [DYE996]
    </footer>

    <script>        
        const API_URL = 'api.php';
        let currentPage = 1; 
        
        // Rendezési paraméterek
        let currentSortCol = 'id';
        let currentSortDir = 'desc';

        async function loadData(page = 1) {
            currentPage = page;
            try {
                // A kéréshez hozzáfűzzük a lapozást és a rendezést is!
                const res = await fetch(`${API_URL}?page=${currentPage}&sort=${currentSortCol}&dir=${currentSortDir}`);
                const result = await res.json();
                
                const data = result.data || [];
                const totalPages = Math.ceil((result.total || 0) / (result.limit || 100)) || 1;

                const tbody = document.querySelector('#pTable tbody');
                tbody.innerHTML = data.map(p => `
                    <tr>
                        <td>${p.datum || ''}</td>
                        <td><strong>${p.pilota_neve ? p.pilota_neve : 'ID: ' + p.pilotaaz}</strong></td>
                        <td>${p.helyezes || ''}</td>
                        <td>${p.hiba || ''}</td>
                        <td>${p.csapat || ''}</td>
                        <td>${p.tipus || ''}</td>
                        <td>${p.motor || ''}</td>
                        <td>
                            <button class="btn-update" onclick="prepareUpdate('${p.id}', '${p.datum}', '${p.pilotaaz}', '${p.helyezes}', '${p.hiba}', '${p.csapat}', '${p.tipus}', '${p.motor}')">Módosít</button>
                            <button class="btn-delete" onclick="deleteItem('${p.id}')">Töröl</button>
                        </td>
                    </tr>
                `).join('');

                renderPagination(totalPages);
                updateSortIcons();
            } catch (error) {
                console.error("Hiba az adatok betöltésekor!", error);
            }
        }

        // Rendezés kérése a fejlécre kattintáskor
        function requestSort(col) {
            if (currentSortCol === col) {
                currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortCol = col;
                currentSortDir = 'asc';
            }
            loadData(1); // Rendezéskor mindig visszaugrik az 1. oldalra
        }

        // Nyilak vizuális frissítése a fejlécben
        function updateSortIcons() {
            document.querySelectorAll('th span').forEach(span => span.innerText = '↕️');
            const activeSpan = document.getElementById(`sort-${currentSortCol}`);
            if(activeSpan) {
                activeSpan.innerText = currentSortDir === 'asc' ? '⬆️' : '⬇️';
            }
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('paginationContainer');
            if (!container) return;

            let html = '';
            
            if (currentPage > 10) {
                html += `<button class="pagination-btn" onclick="loadData(${currentPage - 10})">&laquo; -10</button>`;
            }
            
            html += `<button class="pagination-btn" ${currentPage <= 1 ? 'disabled' : ''} onclick="loadData(${currentPage - 1})">Előző</button>`;
            
            html += `<span style="margin: 0 15px; font-weight: bold; font-size: 1.1em;">${currentPage}. oldal a ${totalPages}-ből</span>`;

            html += `<button class="pagination-btn" ${currentPage >= totalPages ? 'disabled' : ''} onclick="loadData(${currentPage + 1})">Következő</button>`;

            if (currentPage <= totalPages - 10) {
                html += `<button class="pagination-btn" onclick="loadData(${currentPage + 10})">+10 &raquo;</button>`;
            }

            container.innerHTML = html;
        }

        async function handleSubmit() {
            const id = document.getElementById('editId').value;
            const payload = {
                datum: document.getElementById('pDatum').value,
                pilotaaz: document.getElementById('pPilotaaz').value,
                helyezes: document.getElementById('pHelyezes').value,
                hiba: document.getElementById('pHiba').value,
                csapat: document.getElementById('pCsapat').value,
                tipus: document.getElementById('pTipus').value,
                motor: document.getElementById('pMotor').value
            };
            
            if(!payload.datum || !payload.pilotaaz) {
                alert("A dátum és a pilóta ID megadása kötelező!");
                return;
            }

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(id ? { ...payload, id } : payload)
            });
            
            resetForm();
            loadData(currentPage); 
        }

        function prepareUpdate(id, datum, pilotaaz, helyezes, hiba, csapat, tipus, motor) {
            document.getElementById('editId').value = id;
            document.getElementById('pDatum').value = datum !== 'null' ? datum : '';
            document.getElementById('pPilotaaz').value = pilotaaz !== 'null' ? pilotaaz : '';
            document.getElementById('pHelyezes').value = helyezes !== 'null' ? helyezes : '';
            document.getElementById('pHiba').value = hiba !== 'null' ? hiba : '';
            document.getElementById('pCsapat').value = csapat !== 'null' ? csapat : '';
            document.getElementById('pTipus').value = tipus !== 'null' ? tipus : '';
            document.getElementById('pMotor').value = motor !== 'null' ? motor : '';
            
            document.getElementById('submitBtn').innerText = "Mentés";
            document.getElementById('submitBtn').classList.replace('btn-add', 'btn-update');
            document.getElementById('cancelBtn').style.display = "inline";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('pDatum').value = '';
            document.getElementById('pPilotaaz').value = '';
            document.getElementById('pHelyezes').value = '';
            document.getElementById('pHiba').value = '';
            document.getElementById('pCsapat').value = '';
            document.getElementById('pTipus').value = '';
            document.getElementById('pMotor').value = '';
            
            document.getElementById('submitBtn').innerText = "Hozzáadás";
            document.getElementById('submitBtn').classList.replace('btn-update', 'btn-add');
            document.getElementById('cancelBtn').style.display = "none";
        }

        async function deleteItem(id) {
            if(confirm("Biztosan törlöd ezt az eredményt az adatbázisból?")) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadData(currentPage); 
            }
        }

        window.onload = () => loadData(1);
    </script>
</body>
</html>
